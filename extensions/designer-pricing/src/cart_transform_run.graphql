query CartTransformRunInput {
  cart {
    lines {
      id
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          designerEnabled: metafield(namespace: "custom", key: "designer_discount_enabled") {
            value
          }
          designerPrice: metafield(namespace: "custom", key: "designer_price") {
            value
          }
        }
      }
    }
    buyerIdentity {
      customer {
        customerLevel: metafield(namespace: "custom", key: "customerlevel") {
          value
        }
      }
    }
  }
}
